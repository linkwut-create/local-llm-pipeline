# Project-level Codex configuration.
# Keep this file free of secrets and machine-specific absolute paths.
# Project policy lives in AGENTS.md and .codex/local-llm-worker.md.
# Local model calls are performed through tools/local_llm_router.py.

# Local LLM MCP server (source-non-mutating tools for code review and drafting).
# See: https://developers.openai.com/codex/mcp
[mcp_servers.local-llm]
command = "python3"
args = ["tools/local_llm_mcp_server.py"]
cwd = "."
startup_timeout_sec = 30
tool_timeout_sec = 900
env = { LOCAL_LLM_BASE_URL = "http://127.0.0.1:11436", OLLAMA_HOST = "http://127.0.0.1:11436", LOCAL_LLM_PROVIDER = "ollama", LOCAL_LLM_KEEP_ALIVE = "-1", LOCAL_LLM_RESIDENT_MODELS = "qwen3.6:27b", LOCAL_LLM_RESIDENCY_FORCE = "true" }
